<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kingdom</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kingdom">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{
margin:0;
font-family:sans-serif;
background:black;
color:gold;
font-weight:bold;
overflow:hidden;
}

/* glow text */
h2{
text-shadow:0 0 10px gold,0 0 20px gold;
}

/* rain canvas */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* panel */
.panel{
position:relative;
z-index:1;
display:none;
padding:20px;
text-align:center;
}

/* input */
input,button{
width:90%;
padding:12px;
margin:8px;
border-radius:12px;
border:none;
}

/* button */
button{
background:gold;
font-weight:bold;
box-shadow:0 0 10px gold;
}

/* toggle */
.toggle{
display:flex;
justify-content:space-between;
background:#111;
padding:14px;
margin:12px 0;
border-radius:12px;
transition:.3s;
}

.toggle.active{
box-shadow:0 0 20px gold;
}

/* slider */
.slider{
width:90%;
}

</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="loading" style="position:fixed;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;font-size:35px;">
👑 Kingdom
</div>

<div class="panel" id="app">

<h2>Kingdom Panel</h2>

<div id="login">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">เข้าสู่ระบบ</button>
</div>

<div id="menu" style="display:none;">

<div class="toggle"><span>ดูดหัว 100%</span><input type="checkbox" onchange="toggle(this,0)"></div>
<div class="toggle"><span>ดูดหัว 85%</span><input type="checkbox" onchange="toggle(this,1)"></div>
<div class="toggle"><span>กันแบน 100%</span><input type="checkbox" onchange="toggle(this,2)"></div>

<p>DPI: <span id="dpiValue">500</span></p>
<input type="range" min="1" max="1000" value="500" class="slider" oninput="dpi(this.value)">

</div>

</div>

<script>

// loading
setTimeout(()=>{
loading.style.display="none";
app.style.display="block";
},1500);

// login
function login(){
if(user.value==="Kingdom" && pass.value==="2001"){
login.style.display="none";
menu.style.display="block";
vibrate();
}else alert("รหัสผิด");
}

// toggle
function toggle(el,i){
el.parentElement.classList.toggle("active");
vibrate();
save();
}

// DPI
function dpi(val){
dpiValue.innerText=val;
playSound();
localStorage.setItem("dpi",val);
}

// vibration
function vibrate(){
if(navigator.vibrate) navigator.vibrate(50);
}

// sound
function playSound(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.05);
}

// save
function save(){
let arr=[];
document.querySelectorAll("input[type=checkbox]").forEach(c=>arr.push(c.checked));
localStorage.setItem("toggles",JSON.stringify(arr));
}

// load
window.onload=function(){
let t=JSON.parse(localStorage.getItem("toggles"));
if(t){
document.querySelectorAll("input[type=checkbox]").forEach((c,i)=>{
c.checked=t[i];
if(c.checked)c.parentElement.classList.add("active");
});
}
let d=localStorage.getItem("dpi");
if(d){
dpiValue.innerText=d;
}
}

// rain + lightning
let c=document.getElementById("rain");
let ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let rain=Array(200).fill(0);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0ff";
ctx.font="14px monospace";

rain.forEach((y,i)=>{
ctx.fillText("|",i*10,y);
rain[i]=y>c.height?0:y+10;
});

// lightning
if(Math.random()<0.01){
ctx.fillStyle="rgba(255,255,255,0.8)";
ctx.fillRect(0,0,c.width,c.height);
}

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
